name: Windows Build

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure
        run: cmake -S . -B build -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test
        run: .\build\bin\RenderSmoke.exe

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $match = Select-String -Path VERSION.md -Pattern 'Current version:\s*([0-9]+\.[0-9]+\.[0-9]+)'
          $version = $match.Matches[0].Groups[1].Value
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\Backdropper | Out-Null
          Copy-Item -Path build\bin\BackdropperSettings.exe, build\bin\BackdropperThumb.dll, README.md, LICENSE, PRIVACY.md -Destination dist\Backdropper
          Compress-Archive -Path dist\Backdropper\* -DestinationPath "dist\Backdropper-${{ steps.version.outputs.version }}-windows-x64.zip" -Force

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: Backdropper-windows-x64
          path: dist/Backdropper-${{ steps.version.outputs.version }}-windows-x64.zip

      - name: Publish release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          $zip = 'dist\Backdropper-${{ steps.version.outputs.version }}-windows-x64.zip'
          if (gh release view $tag *> $null) {
            gh release upload $tag $zip --clobber
          } else {
            gh release create $tag $zip --target $env:GITHUB_SHA --title "Backdropper $tag" --notes "Automated Windows x64 build for $tag."
          }
