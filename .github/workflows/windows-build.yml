name: Windows Build

on:
  push:
  pull_request:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure
        run: cmake -S . -B build -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Validate signing configuration
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
        run: |
          $required = 'AZURE_CLIENT_ID','AZURE_TENANT_ID','AZURE_SUBSCRIPTION_ID','AZURE_ARTIFACT_SIGNING_ENDPOINT','AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME','AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME'
          $missing = $required | Where-Object { [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_)) }
          if ($missing) { throw "Missing GitHub repository variables: $($missing -join ', ')" }

      - name: Azure login
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sign shipping binaries
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files: |
            ${{ github.workspace }}\build\bin\BackdropperSettings.exe
            ${{ github.workspace }}\build\bin\BackdropperThumb.dll
            ${{ github.workspace }}\build\bin\BackdropperUpdater.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Smoke test
        shell: pwsh
        run: |
          .\build\bin\RenderSmoke.exe
          .\build\bin\BackdropperUpdater.exe --self-test

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $match = Select-String -Path VERSION.md -Pattern 'Current version:\s*([0-9]+\.[0-9]+\.[0-9]+)'
          $version = $match.Matches[0].Groups[1].Value
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\Backdropper | Out-Null
          Copy-Item -Path build\bin\BackdropperSettings.exe, build\bin\BackdropperThumb.dll, build\bin\BackdropperUpdater.exe, README.md, LICENSE, PRIVACY.md, THIRD_PARTY_NOTICES.md -Destination dist\Backdropper
          Compress-Archive -Path dist\Backdropper\* -DestinationPath "dist\Backdropper-${{ steps.version.outputs.version }}-windows-x64.zip" -Force
          Set-Content -Path dist\backdropper-version.txt -Value "${{ steps.version.outputs.version }}" -NoNewline

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: Backdropper-windows-x64
          path: dist/Backdropper-${{ steps.version.outputs.version }}-windows-x64.zip

      - name: Publish release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          $zip = 'dist\Backdropper-${{ steps.version.outputs.version }}-windows-x64.zip'
          $versionFile = 'dist\backdropper-version.txt'
          $notes = 'dist\release-notes.md'
          git fetch --tags --force
          $previousTag = git tag --sort=-v:refname |
            Where-Object { $_ -match '^v[0-9]+\.[0-9]+\.[0-9]+$' -and $_ -ne $tag } |
            Select-Object -First 1

          "# Backdropper $tag" | Set-Content $notes
          "" | Add-Content $notes
          "## What's Changed" | Add-Content $notes
          if ($previousTag) {
            "" | Add-Content $notes
            "Changes since [$previousTag](https://github.com/$env:GITHUB_REPOSITORY/compare/$previousTag...$tag)." | Add-Content $notes
            $commits = @(git log "$previousTag..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          } else {
            $commits = @(git log --pretty=format:"- %s (%h)" --no-merges)
          }
          if ($commits.Count -gt 0) {
            $commits | Add-Content $notes
          } else {
            "- No code changes since the previous release." | Add-Content $notes
          }
          "" | Add-Content $notes
          "## Build" | Add-Content $notes
          "- Windows x64 ZIP: ``Backdropper-${{ steps.version.outputs.version }}-windows-x64.zip``" | Add-Content $notes

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zip $versionFile --clobber
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            gh release edit $tag --title "Backdropper $tag" --notes-file $notes
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            gh release create $tag $zip $versionFile --target $env:GITHUB_SHA --title "Backdropper $tag" --notes-file $notes
            if ($LASTEXITCODE -ne 0) {
              gh release upload $tag $zip $versionFile --clobber
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
              gh release edit $tag --title "Backdropper $tag" --notes-file $notes
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
          }
