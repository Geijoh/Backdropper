name: Windows Build

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure
        run: cmake -S . -B build -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test
        run: .\build\bin\RenderSmoke.exe

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $match = Select-String -Path VERSION.md -Pattern 'Current version:\s*([0-9]+\.[0-9]+\.[0-9]+)'
          $version = $match.Matches[0].Groups[1].Value
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\Backdropper | Out-Null
          Copy-Item -Path build\bin\BackdropperSettings.exe, build\bin\BackdropperThumb.dll, tools\update-backdropper.ps1, README.md, LICENSE, PRIVACY.md -Destination dist\Backdropper
          Compress-Archive -Path dist\Backdropper\* -DestinationPath "dist\Backdropper-${{ steps.version.outputs.version }}-windows-x64.zip" -Force
          Copy-Item -Path "dist\Backdropper-${{ steps.version.outputs.version }}-windows-x64.zip" -Destination "dist\Backdropper-latest-windows-x64.zip" -Force
          Set-Content -Path dist\backdropper-version.txt -Value "${{ steps.version.outputs.version }}" -NoNewline

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: Backdropper-windows-x64
          path: dist/Backdropper-${{ steps.version.outputs.version }}-windows-x64.zip

      - name: Publish release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          $zip = 'dist\Backdropper-${{ steps.version.outputs.version }}-windows-x64.zip'
          $latestZip = 'dist\Backdropper-latest-windows-x64.zip'
          $versionFile = 'dist\backdropper-version.txt'
          $notes = 'dist\release-notes.md'
          git fetch --tags --force
          $previousTag = git tag --sort=-v:refname |
            Where-Object { $_ -match '^v[0-9]+\.[0-9]+\.[0-9]+$' -and $_ -ne $tag } |
            Select-Object -First 1

          "# Backdropper $tag" | Set-Content $notes
          "" | Add-Content $notes
          "## What's Changed" | Add-Content $notes
          if ($previousTag) {
            "" | Add-Content $notes
            "Changes since [$previousTag](https://github.com/$env:GITHUB_REPOSITORY/compare/$previousTag...$tag)." | Add-Content $notes
            $commits = @(git log "$previousTag..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          } else {
            $commits = @(git log --pretty=format:"- %s (%h)" --no-merges)
          }
          if ($commits.Count -gt 0) {
            $commits | Add-Content $notes
          } else {
            "- No code changes since the previous release." | Add-Content $notes
          }
          "" | Add-Content $notes
          "## Build" | Add-Content $notes
          "- Windows x64 ZIP: ``Backdropper-${{ steps.version.outputs.version }}-windows-x64.zip``" | Add-Content $notes
          "- Updater ZIP: ``Backdropper-latest-windows-x64.zip``" | Add-Content $notes

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zip $latestZip $versionFile --clobber
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            gh release edit $tag --title "Backdropper $tag" --notes-file $notes
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            gh release create $tag $zip $latestZip $versionFile --target $env:GITHUB_SHA --title "Backdropper $tag" --notes-file $notes
            if ($LASTEXITCODE -ne 0) {
              gh release upload $tag $zip $latestZip $versionFile --clobber
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
              gh release edit $tag --title "Backdropper $tag" --notes-file $notes
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
          }
